name: Publish Pre-Release Packages (Manual)

on:
    workflow_dispatch:
        inputs:
            alpha_number:
                description: "Numeric part for prerelease suffix alpha-<number> (digits only)"
                required: true
                type: string

env:
    NuGetDirectory: ${{ github.workspace }}/nuget

permissions:
    contents: read
    packages: write

jobs:
    PackAndPublishPreRelease:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: |
                      9.0.x
                      10.0.x

            # Validate input strictly and derive a safe suffix.
            # No user-controlled content is used in other run blocks.
            - name: Compute safe prerelease suffix
              id: suffix
              shell: bash
              run: |
                  set -euo pipefail

                  n='${{ inputs.alpha_number }}'

                  # digits only
                  if [[ ! "$n" =~ ^[0-9]+$ ]]; then
                    echo "alpha_number must be digits only."
                    exit 1
                  fi

                  # optional sanity limit (prevents absurdly long strings)
                  if [[ ${#n} -gt 9 ]]; then
                    echo "alpha_number too long (max 9 digits)."
                    exit 1
                  fi

                  echo "value=alpha-$n" >> "$GITHUB_OUTPUT"

            - name: Restore dependencies
              run: dotnet restore

            - name: Build (with prerelease suffix)
              run: dotnet build KnightBus.slnx --no-restore --configuration Release --version-suffix "${{ steps.suffix.outputs.value }}"

            - name: Detect version-bumped packages vs origin/master
              id: packages
              shell: bash
              run: |
                  set -euo pipefail

                  # Always compare against the protected base branch, not user input
                  git fetch --no-tags --prune origin +refs/heads/*:refs/remotes/origin/*

                  BASE="origin/master"
                  echo "Diffing against base: $BASE"

                  # Changed csprojs (exclude obj/)
                  mapfile -t CSPROJS < <(git diff --name-only "$BASE"...HEAD -- '**/*.csproj' | grep -v '/obj/' || true)

                  if [[ ${#CSPROJS[@]} -eq 0 ]]; then
                    echo "No csproj changes vs $BASE."
                    echo "hasPackages=false" >> "$GITHUB_OUTPUT"
                    echo "packProjects=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  PACK_PROJECTS=()

                  for f in "${CSPROJS[@]}"; do
                    DIFF="$(git diff -U0 "$BASE"...HEAD -- "$f" || true)"

                    if echo "$DIFF" | grep -E '^[+-].*<(Version|VersionPrefix|PackageVersion)>' >/dev/null; then
                      echo "Version change detected in: $f"
                      PACK_PROJECTS+=("$f")
                    fi
                  done

                  if [[ ${#PACK_PROJECTS[@]} -eq 0 ]]; then
                    echo "No version bumps detected."
                    echo "hasPackages=false" >> "$GITHUB_OUTPUT"
                    echo "packProjects=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  {
                    echo "hasPackages=true"
                    echo "packProjects<<EOF"
                    printf "%s\n" "${PACK_PROJECTS[@]}"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Pack bumped packages (with prerelease suffix)
              if: steps.packages.outputs.hasPackages == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p "${{ env.NuGetDirectory }}"

                  while IFS= read -r proj; do
                    [[ -z "$proj" ]] && continue
                    echo "Packing $proj"
                    dotnet pack "$proj" \
                      --no-build \
                      --configuration Release \
                      --output "${{ env.NuGetDirectory }}" \
                      --version-suffix "${{ steps.suffix.outputs.value }}"
                  done <<< "${{ steps.packages.outputs.packProjects }}"

            - name: Upload packages artifact
              if: steps.packages.outputs.hasPackages == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: nuget-prerelease
                  if-no-files-found: error
                  retention-days: 7
                  path: ${{ env.NuGetDirectory }}/*.nupkg

            - name: Push prerelease packages to GitHub Packages
              if: steps.packages.outputs.hasPackages == 'true'
              shell: pwsh
              run: |
                  foreach($file in (Get-ChildItem "${{ env.NuGetDirectory }}" -Recurse -Include *.nupkg)) {
                    dotnet nuget push $file --api-key ${{ secrets.NUGET_APIKEY }} --source "https://api.nuget.org/v3/index.json" --skip-duplicate
                  }
