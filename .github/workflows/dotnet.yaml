name: .NET

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
env:
  NuGetDirectory: ${{ github.workspace }}/nuget

jobs:
  Build:
    runs-on: ubuntu-latest

    outputs:
      hasPackages: ${{ steps.packages.outputs.hasPackages }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      # Compute prerelease suffix for PRs, empty for master pushes
      - name: Compute VersionSuffix
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # NuGet prerelease label
            echo "suffix=-pr.${{ github.event.pull_request.number }}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run csharpier format
        run: |
          dotnet tool restore
          dotnet csharpier check .
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build KnightBus.slnx --no-restore --configuration Release --version-suffix "${{ steps.version.outputs.suffix }}"

      # Figure out which package csprojs had a version bump in this change
      - name: Detect version-bumped packages
        id: packages
        shell: bash
        run: |
          set -euo pipefail

          # Determine diff range depending on event
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          echo "Diff range: $BASE..$HEAD"

          # List changed csprojs (exclude obj/)
          mapfile -t CSPROJS < <(git diff --name-only "$BASE" "$HEAD" -- '**/*.csproj' | grep -v '/obj/' || true)

          if [[ ${#CSPROJS[@]} -eq 0 ]]; then
            echo "No csproj changes."
            echo "hasPackages=false" >> "$GITHUB_OUTPUT"
            echo "packProjects=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PACK_PROJECTS=()

          for f in "${CSPROJS[@]}"; do
            # Look for changes to version tags in this csproj
            # -U0 keeps the diff small; we check added/removed lines
            DIFF="$(git diff -U0 "$BASE" "$HEAD" -- "$f" || true)"

            if echo "$DIFF" | grep -E '^[+-].*<(Version|VersionPrefix|PackageVersion)>' >/dev/null; then
              echo "Version change detected in: $f"
              PACK_PROJECTS+=("$f")
            fi
          done

          if [[ ${#PACK_PROJECTS[@]} -eq 0 ]]; then
            echo "No version bumps detected in csproj changes."
            echo "hasPackages=false" >> "$GITHUB_OUTPUT"
            echo "packProjects=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Output newline-separated list for later looping
          {
            echo "hasPackages=true"
            echo "packProjects<<EOF"
            printf "%s\n" "${PACK_PROJECTS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Pack ONLY the bumped projects
      - name: Pack bumped packages
        if: steps.packages.outputs.hasPackages == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ env.NuGetDirectory }}"

          echo "Packing projects:"
          echo "${{ steps.packages.outputs.packProjects }}"

          while IFS= read -r proj; do
            [[ -z "$proj" ]] && continue
            echo "Packing $proj"
            dotnet pack "$proj" \
              --no-build \
              --configuration Release \
              --output "${{ env.NuGetDirectory }}" \
              --version-suffix "${{ steps.version.outputs.suffix }}"
          done <<< "${{ steps.packages.outputs.packProjects }}"

      # Install docker test dependencies
      - name: Docker Azurite
        run: docker run -d -p 10000:10000 -p 10001:10001 mcr.microsoft.com/azure-storage/azurite
      - name: Docker nats
        run: docker run -d -p 4222:4222 nats:latest

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx" || true

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: DotNET Tests
          path: "**/test-results.trx"
          reporter: dotnet-trx
          fail-on-error: true

      # Only upload artifact if we actually packed anything
      - uses: actions/upload-artifact@v4
        if: steps.packages.outputs.hasPackages == 'true'
        with:
          name: nuget
          if-no-files-found: error
          retention-days: 7
          path: ${{ env.NuGetDirectory }}/*.nupkg

  Publish:
    if: github.ref == 'refs/heads/master' && needs.Build.outputs.hasPackages == 'true'
    runs-on: ubuntu-latest
    needs: [Build]

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5

      - name: Publish NuGet package
        run: |
          foreach($file in (Get-ChildItem "${{ env.NuGetDirectory }}" -Recurse -Include *.nupkg)) {
              dotnet nuget push $file --api-key "${{ secrets.NUGET_APIKEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
        shell: pwsh

  PublishPreRelease:
    if: github.event_name == 'pull_request' && needs.Build.outputs.hasPackages == 'true'
    runs-on: ubuntu-latest
    needs: [Build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      - uses: actions/setup-dotnet@v5

      - name: Push prerelease packages to prerelease feed
        run: |
          foreach($file in (Get-ChildItem "${{ env.NuGetDirectory }}" -Recurse -Include *.nupkg)) {
            dotnet nuget push $file --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/BookBeat/index.json" --skip-duplicate
          }
        shell: pwsh
